name: Registry API Deploy

on:
  push:
    branches: [main]
    paths:
      - "packages/crucible-registry/**"
  workflow_dispatch:

concurrency:
  group: registry-api-deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  FUNCTION_PREFIX: crucible-registry

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm --filter crucible-registry typecheck
      - name: Test
        run: pnpm --filter crucible-registry test:run

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter crucible-registry build

      - name: Package Lambda deployment ZIP
        run: |
          cd packages/crucible-registry
          mkdir -p /tmp/lambda-package

          # Copy compiled output (strip source maps and declarations)
          find dist -name '*.js' | while read f; do
            mkdir -p "/tmp/lambda-package/$(dirname "$f")"
            cp "$f" "/tmp/lambda-package/$f"
          done

          # Install prod-only deps into the package
          cp package.json /tmp/lambda-package/
          cd /tmp/lambda-package
          npm install --omit=dev --ignore-scripts 2>/dev/null || true

          zip -r /tmp/crucible-registry.zip .
          echo "Package size: $(du -h /tmp/crucible-registry.zip | cut -f1)"
          echo "### Lambda Package" >> "$GITHUB_STEP_SUMMARY"
          echo "Size: $(du -h /tmp/crucible-registry.zip | cut -f1)" >> "$GITHUB_STEP_SUMMARY"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # NOTE: crucible-ci role needs these permissions on crucible-registry-* functions:
          # lambda:UpdateFunctionCode, lambda:GetFunction, lambda:InvokeFunction
          # See volley-infra/terraform/crucible-ci/iam.tf
          role-to-assume: arn:aws:iam::375633680607:role/crucible-ci
          aws-region: us-east-1
          role-session-name: registry-api-deploy-${{ github.run_number }}

      - name: Deploy to Lambda functions
        run: |
          FUNCTIONS=(
            "get-games"
            "get-game"
            "put-game"
            "get-game-history"
            "delete-game"
          )

          for func in "${FUNCTIONS[@]}"; do
            FUNCTION_NAME="${FUNCTION_PREFIX}-${func}"
            echo "Deploying ${FUNCTION_NAME}..."
            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --zip-file fileb:///tmp/crucible-registry.zip \
              --region "$AWS_REGION" \
              --no-cli-pager

            # Wait for update to complete
            aws lambda wait function-updated \
              --function-name "$FUNCTION_NAME" \
              --region "$AWS_REGION"

            echo "✓ ${FUNCTION_NAME} deployed"
          done

      - name: Smoke test — GET /games
        run: |
          # AWS CLI v2 requires base64-encoded payloads
          PAYLOAD=$(echo -n '{"httpMethod":"GET","path":"/games","headers":{},"queryStringParameters":null,"pathParameters":null,"body":null}' | base64 -w 0)

          aws lambda invoke \
            --function-name "${FUNCTION_PREFIX}-get-games" \
            --payload "$PAYLOAD" \
            --region "$AWS_REGION" \
            --no-cli-pager \
            /tmp/response.json

          STATUS=$(jq -r '.statusCode' /tmp/response.json)
          echo "GET /games status: ${STATUS}"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed! Response:"
            cat /tmp/response.json
            exit 1
          fi
          echo "✓ Smoke test passed"
